<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try { var t = localStorage.getItem('acm-theme') || 'dark'; var e = document.documentElement; e.classList.remove('light', 'dark'); e.classList.add(t); } catch (_) { document.documentElement.classList.add('dark'); }
        try { if (!localStorage.getItem('acm-auth')) location.replace('login.html'); } catch (_) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c6cff'/%3E%3Cstop offset='1' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M16 7l2.2 5.3L24 14l-5.3 2.2L16 21l-2.2-5.3L8 14z' fill='white'/%3E%3C/svg%3E" />
    <title>Dashboard · AI Career Mentor</title>
    <meta name="description" content="Your AI career command center — 10 tools, one memory." />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
      tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: 'hsl(250 84% 62%)', accent: 'hsl(190 95% 55%)', ink: 'hsl(240 15% 4%)' }, fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], display: ['"Sora"', 'Inter', 'sans-serif'] } } } };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="app.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="app.js" defer></script>

    <style>
      /* ---------- page-specific ---------- */
      .stat-card { transition: transform .25s cubic-bezier(.2,.8,.2,1), border-color .25s, box-shadow .25s; will-change: transform; }
      .stat-card:hover { transform: translateY(-5px); border-color: hsla(250,84%,62%,.45); box-shadow: 0 22px 50px -24px hsla(250,84%,62%,.55); }

      .nav-link { position: relative; transition: color .2s, background .2s; }
      .nav-link::before { content: ''; position: absolute; left: 0; top: 50%; height: 0; width: 3px; border-radius: 9999px; background: linear-gradient(hsl(var(--primary)), hsl(var(--accent))); transform: translateY(-50%); transition: height .25s ease; }
      .nav-link:hover::before, .nav-link.active::before { height: 60%; }

      .switch { width: 44px; height: 24px; border-radius: 9999px; background: var(--surface-2); position: relative; transition: background .2s; cursor: pointer; flex: none; }
      .switch::after { content: ''; position: absolute; top: 3px; left: 3px; height: 18px; width: 18px; border-radius: 9999px; background: #fff; transition: transform .2s; box-shadow: 0 1px 3px rgba(0,0,0,.3); }
      .switch.on { background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent))); }
      .switch.on::after { transform: translateX(20px); }

      .bubble-user { background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent))); color: #fff; }
      .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 9999px; background: currentColor; opacity: .5; animation: blink 1.2s infinite; }
      .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
      @keyframes blink { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

      #toasts { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 100; display: flex; flex-direction: column; gap: .6rem; }
      .toast { animation: toastIn .3s cubic-bezier(.2,.8,.2,1) both; }
      .toast.out { animation: toastOut .3s ease forwards; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
      @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }
      #modalRoot:not(.hidden) { animation: fadeIn .2s ease; }
      .modal-card { animation: modalIn .25s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes fadeIn { from { opacity: 0; } } @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(.98); } }

      .dropzone { transition: border-color .2s, background .2s; }
      .dropzone.is-drag { border-color: hsl(var(--primary)); background: hsla(250,84%,62%,.08); }

      .view-enter { animation: viewIn .4s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes viewIn { from { opacity: 0; transform: translateY(12px); } }

      /* command palette */
      .cmdk-card { animation: modalIn .2s cubic-bezier(.2,.8,.2,1) both; }
      .cmdk-item { transition: background-color .12s ease; cursor: pointer; }
      .cmdk-item.active, .cmdk-item:hover { background: var(--surface-2); }
      .cmdk-item.active { box-shadow: inset 2px 0 0 hsl(var(--primary)); }

      /* readiness gauge ring */
      .ring-track { stroke: var(--surface-2); }
      .ring-bar { transition: stroke-dashoffset 1.4s cubic-bezier(.2,.8,.2,1); }

      /* confetti pieces use the Web Animations API (added/removed in JS) */
      .confetti-piece { position: fixed; top: -12px; will-change: transform; border-radius: 2px; z-index: 120; pointer-events: none; }

      @media (prefers-reduced-motion: reduce) { .view-enter, .toast, .modal-card, .cmdk-card { animation: none !important; } .ring-bar { transition: none !important; } }
    </style>
  </head>

  <body class="min-h-screen antialiased">
    <div class="grid-bg"></div>
    <div class="orb-layer"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

    <div class="flex min-h-screen">
      <!-- ===================== Sidebar ===================== -->
      <aside id="sidebar" class="glass fixed inset-y-0 left-0 z-40 w-64 shrink-0 -translate-x-full overflow-y-auto p-4 transition-transform duration-300 lg:sticky lg:top-0 lg:h-screen lg:translate-x-0">
        <a href="index.html" class="mb-7 flex items-center gap-2.5 px-2 font-bold">
          <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-primary to-accent text-white"><i data-lucide="sparkles" class="h-5 w-5"></i></span>
          <span class="font-display text-base">Career Mentor</span>
        </a>
        <nav id="nav" class="flex flex-col gap-0.5"></nav>

        <div class="glass mt-6 rounded-2xl bg-gradient-to-br from-primary/15 to-accent/10 p-4">
          <p class="inline-flex items-center gap-1.5 text-xs font-semibold text-primary"><i data-lucide="zap" class="h-3.5 w-3.5"></i> Free plan</p>
          <p class="mt-1 text-sm text-slate-300">Unlock unlimited scans, interviews &amp; exports.</p>
          <button data-action="upgrade" class="btn-primary mt-3 w-full rounded-lg py-2 text-sm font-semibold">Upgrade to Pro</button>
        </div>
      </aside>

      <div id="backdrop" class="fixed inset-0 z-30 hidden bg-black/60 backdrop-blur-sm lg:hidden"></div>

      <!-- ===================== Main ===================== -->
      <div class="flex min-h-screen flex-1 flex-col px-4 pb-12 pt-4 sm:px-6">
        <!-- Topbar -->
        <header class="glass relative z-20 mb-6 flex h-14 items-center justify-between gap-3 rounded-2xl px-3 sm:px-4">
          <div class="flex flex-1 items-center gap-2">
            <button id="menuBtn" class="theme-toggle lg:hidden" aria-label="Open menu"><i data-lucide="menu" class="h-5 w-5"></i></button>
            <button id="cmdkOpen" type="button" class="group flex max-w-md flex-1 items-center gap-2 rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-slate-500 transition hover:border-primary/50 hover:bg-white/10">
              <i data-lucide="search" class="h-4 w-4"></i>
              <span class="flex-1 truncate text-left">Search tools &amp; actions…</span>
              <kbd class="hidden items-center rounded border border-white/15 bg-white/5 px-1.5 py-0.5 text-[10px] font-semibold tracking-wide text-slate-400 sm:inline-flex">⌘K</kbd>
            </button>
          </div>
          <div class="flex items-center gap-2">
            <button data-theme-toggle class="theme-toggle" type="button" aria-label="Toggle theme"></button>
            <div class="relative">
              <button id="bellBtn" class="theme-toggle relative" aria-label="Notifications">
                <i data-lucide="bell" class="h-5 w-5"></i>
                <span class="absolute right-2 top-2 h-2 w-2 rounded-full bg-accent ring-2 ring-ink"></span>
              </button>
              <div id="notifPanel" class="absolute right-0 top-12 z-30 hidden w-80 overflow-hidden rounded-xl border border-white/10 bg-ink/95 shadow-2xl backdrop-blur"></div>
            </div>
            <div class="relative">
              <button id="avatarBtn" class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-primary to-accent text-sm font-semibold text-white" aria-label="Account">A</button>
              <div id="avatarPanel" class="absolute right-0 top-12 z-30 hidden w-52 overflow-hidden rounded-xl border border-white/10 bg-ink/95 p-1.5 shadow-2xl backdrop-blur"></div>
            </div>
          </div>
        </header>

        <div id="pageHeader" class="mx-auto mb-6 w-full max-w-6xl"></div>
        <main id="content" class="mx-auto w-full max-w-6xl flex-1"></main>
        <p class="mx-auto mt-8 w-full max-w-6xl text-center text-xs text-slate-500">Static preview · the real dashboard fetches live data from the NestJS API</p>
      </div>
    </div>

    <div id="toasts"></div>
    <div id="modalRoot" class="fixed inset-0 z-[90] hidden items-center justify-center bg-black/70 p-4 backdrop-blur-sm"></div>

    <!-- ⌘K command palette -->
    <div id="cmdk" class="fixed inset-0 z-[95] hidden items-start justify-center bg-black/60 p-4 pt-[14vh] backdrop-blur-sm">
      <div class="cmdk-card glass w-full max-w-xl overflow-hidden rounded-2xl shadow-2xl">
        <div class="flex items-center gap-3 border-b border-white/10 px-4">
          <i data-lucide="search" class="h-4 w-4 shrink-0 text-slate-400"></i>
          <input id="cmdkInput" autocomplete="off" placeholder="Search tools &amp; actions…" class="w-full bg-transparent py-3.5 text-sm outline-none placeholder:text-slate-500" />
          <kbd class="rounded border border-white/15 bg-white/5 px-1.5 py-0.5 text-[10px] font-semibold text-slate-400">esc</kbd>
        </div>
        <div id="cmdkList" class="max-h-80 overflow-y-auto p-2"></div>
        <div class="flex items-center gap-4 border-t border-white/10 px-4 py-2 text-[11px] text-slate-500">
          <span class="inline-flex items-center gap-1"><kbd class="rounded border border-white/15 px-1">↑↓</kbd> navigate</span>
          <span class="inline-flex items-center gap-1"><kbd class="rounded border border-white/15 px-1">⏎</kbd> open</span>
          <span class="inline-flex items-center gap-1"><kbd class="rounded border border-white/15 px-1">esc</kbd> close</span>
        </div>
      </div>
    </div>

    <script>
      /* ============================ DATA ============================ */
      const NAV = [
        ['dashboard', 'layout-dashboard', 'Dashboard'], ['career-report', 'bar-chart-3', 'Career Report'],
        ['resume-analyzer', 'file-search', 'Resume Analyzer'],
        ['ats-scanner', 'shield-check', 'ATS Scanner'], ['skill-gap', 'target', 'Skill Gap'],
        ['job-match', 'briefcase', 'Job Match'], ['mock-interview', 'mic', 'Mock Interview'],
        ['chatbot', 'bot', 'Career Chatbot'], ['recruiter-insights', 'eye', 'Recruiter Insights'],
        ['roadmap', 'map', 'Career Roadmap'], ['resume-builder', 'file-pen', 'Resume Builder'],
        ['cover-letter', 'mail', 'Cover Letters'], ['memory', 'brain-circuit', 'AI Memory'],
        ['progress', 'trending-up', 'Progress'], ['settings', 'settings', 'Settings'], ['admin', 'shield', 'Admin'],
      ];
      const META = Object.fromEntries(NAV.map(([slug, icon, label]) => [slug, { icon, label }]));
      const USER = (function () {
        let d = { name: 'Alex Morgan', email: 'abc@gmail.com' };
        try { const a = JSON.parse(localStorage.getItem('acm-auth') || 'null'); if (a && a.email) d = { name: a.name || 'Alex Morgan', email: a.email }; } catch (_) {}
        d.first = (d.name || 'there').split(' ')[0];
        d.initial = (d.name || 'A').charAt(0).toUpperCase();
        return d;
      })();

      /* ============================ HELPERS ============================ */
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      const icons = () => { if (window.lucide) lucide.createIcons(); };
      const isLight = () => document.documentElement.classList.contains('light');
      const scoreColor = (v) => isLight()
        ? (v >= 80 ? '#059669' : v >= 60 ? '#b45309' : '#e11d48')
        : (v >= 80 ? '#34d399' : v >= 60 ? '#fbbf24' : '#fb7185');

      let chart = null;

      function toast(msg, type = 'info') {
        const map = { info: ['info', 'text-sky-400'], success: ['check-circle-2', 'text-emerald-400'], warn: ['alert-triangle', 'text-amber-400'], error: ['x-circle', 'text-rose-400'] };
        const [icon, color] = map[type] || map.info;
        const el = document.createElement('div');
        el.className = 'toast glass flex items-center gap-3 rounded-xl px-4 py-3 text-sm shadow-2xl';
        el.innerHTML = `<i data-lucide="${icon}" class="h-5 w-5 ${color}"></i><span>${esc(msg)}</span>`;
        $('#toasts').appendChild(el);
        icons();
        setTimeout(() => { el.classList.add('out'); el.addEventListener('animationend', () => el.remove(), { once: true }); }, 3200);
      }

      function openModal(html) {
        const root = $('#modalRoot');
        root.innerHTML = `<div class="modal-card glass w-full max-w-md rounded-2xl p-6 shadow-2xl">${html}</div>`;
        root.classList.remove('hidden'); root.classList.add('flex'); icons();
      }
      function closeModal() { const root = $('#modalRoot'); root.classList.add('hidden'); root.classList.remove('flex'); root.innerHTML = ''; }
      $('#modalRoot').addEventListener('click', (e) => { if (e.target.id === 'modalRoot') closeModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeCmdk(); closeAllPanels(); } });

      function runProgress(barEl, labelEl, steps, done) {
        let i = 0;
        const tick = () => {
          if (i >= steps.length) { done && done(); return; }
          const [pct, label] = steps[i++];
          if (barEl) barEl.style.width = pct + '%';
          if (labelEl) labelEl.textContent = label;
          setTimeout(tick, 450);
        };
        tick();
      }

      /* ============================ VIEWS ============================ */
      const VIEWS = {};

      VIEWS['dashboard'] = {
        subtitle: "Here's your career momentum this week.",
        render() {
          const stats = [['file-search', 'Resume Score', 84, '+6'], ['shield-check', 'ATS Score', 81, '+4'], ['mic', 'Interview Score', 76, '+9'], ['target', 'Job Match Rate', 68, '+3']];
          const quick = [['mic', 'AI Mock Interview', 'Practice your next round', 'mock-interview'], ['mail', 'Cover Letter', 'Generate one in seconds', 'cover-letter'], ['map', 'Career Roadmap', 'See your 6-month plan', 'roadmap']];
          const READY = Math.round((84 + 81 + 76 + 68) / 4); // blended readiness
          return `
            <div class="grid gap-6 lg:grid-cols-3">
            <div class="glass relative flex flex-col items-center gap-6 overflow-hidden rounded-2xl p-6 sm:flex-row sm:p-7 lg:col-span-2">
              <div class="relative grid shrink-0 place-items-center">
                <svg class="h-32 w-32 -rotate-90" viewBox="0 0 120 120">
                  <circle class="ring-track" cx="60" cy="60" r="52" fill="none" stroke-width="10" />
                  <circle data-ring class="ring-bar" cx="60" cy="60" r="52" fill="none" stroke="url(#rg)" stroke-width="10" stroke-linecap="round" stroke-dasharray="327" stroke-dashoffset="327" />
                  <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="hsl(250 84% 62%)" /><stop offset="1" stop-color="hsl(190 95% 55%)" /></linearGradient></defs>
                </svg>
                <div class="absolute text-center"><p data-count="${READY}" class="font-display text-4xl font-bold gradient-text">0</p><p class="text-[10px] font-semibold uppercase tracking-widest text-slate-500">ready</p></div>
              </div>
              <div class="flex-1 text-center sm:text-left">
                <p class="inline-flex items-center gap-1.5 rounded-full border border-primary/30 bg-primary/10 px-3 py-1 text-xs font-semibold uppercase tracking-wider text-primary"><i data-lucide="gauge" class="h-3.5 w-3.5"></i> Career readiness</p>
                <h3 class="mt-3 font-display text-xl font-bold">You're <span class="gradient-text">${READY}% ready</span> for Senior Backend Engineer</h3>
                <p class="mt-1 text-sm text-slate-400">A blended signal across your resume, ATS, interview and job-match scores. Close your top skill gap to break 85.</p>
                <div class="mt-4 flex flex-wrap justify-center gap-2 sm:justify-start">
                  <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Resume 84</span>
                  <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">ATS 81</span>
                  <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Interview 76</span>
                  <span class="rounded-full bg-white/5 px-3 py-1 text-xs text-slate-300">Job match 68</span>
                  <button data-go="skill-gap" class="rounded-full bg-gradient-to-r from-primary to-accent px-3 py-1 text-xs font-semibold text-white">Close a gap →</button>
                </div>
              </div>
            </div>
            <div class="glass flex flex-col rounded-2xl p-6">
              <div class="flex items-center gap-3">
                <span class="grid h-11 w-11 place-items-center rounded-xl bg-gradient-to-br from-primary to-accent font-display text-sm font-bold text-white">L4</span>
                <div><p class="font-display font-semibold leading-tight">Level 4 · Job Hunter</p><p class="text-xs text-slate-500">1,240 / 1,600 XP</p></div>
              </div>
              <div class="mt-4 h-2 overflow-hidden rounded-full bg-white/10"><div data-xp class="h-full rounded-full bg-gradient-to-r from-primary to-accent" style="width:0%;transition:width 1.2s cubic-bezier(.2,.8,.2,1)"></div></div>
              <div class="mt-5 grid grid-cols-2 gap-3">
                <div class="rounded-xl bg-white/5 p-3 text-center"><p class="font-display text-2xl font-bold gradient-text" data-count="1240">0</p><p class="text-xs text-slate-500">total XP</p></div>
                <div class="rounded-xl bg-white/5 p-3 text-center"><p class="font-display text-2xl font-bold gradient-text" data-count="6">0</p><p class="text-xs text-slate-500">badges</p></div>
              </div>
              <button data-go="progress" class="btn-ghost mt-4 rounded-lg py-2 text-sm font-semibold">View progress →</button>
            </div>
            </div>

            <div class="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
              ${stats.map(([icon, label, val, delta]) => `
                <div class="glass stat-card rounded-2xl p-5">
                  <div class="flex items-center justify-between">
                    <span class="grid h-10 w-10 place-items-center rounded-xl bg-white/5 text-primary"><i data-lucide="${icon}" class="h-5 w-5"></i></span>
                    <span class="inline-flex items-center gap-1 rounded-full bg-emerald-400/10 px-2 py-0.5 text-xs font-medium text-emerald-400"><i data-lucide="trending-up" class="h-3 w-3"></i> ${delta}</span>
                  </div>
                  <p class="mt-4 font-display text-3xl font-bold" style="color:${scoreColor(val)}" data-count="${val}">0</p>
                  <p class="text-sm text-slate-400">${label}</p>
                </div>`).join('')}
            </div>

            <div class="mt-6 grid gap-6 lg:grid-cols-3">
              <div class="glass rounded-2xl p-6 lg:col-span-2">
                <h3 class="font-display font-semibold">Score progression</h3>
                <p class="text-sm text-slate-400">Resume vs ATS scores over time</p>
                <div class="mt-4 h-64"><canvas id="chart"></canvas></div>
              </div>
              <div class="glass rounded-2xl bg-gradient-to-br from-primary/15 to-accent/10 p-6">
                <div class="inline-flex items-center gap-1.5 text-sm text-primary"><i data-lucide="sparkles" class="h-4 w-4"></i> AI Next Action</div>
                <h3 class="mt-1 font-display text-xl font-bold">Resume Score: 84%</h3>
                <div class="mt-4 space-y-4 text-sm">
                  <div>
                    <p class="text-xs uppercase tracking-wide text-slate-500">Next recommended step</p>
                    <p class="mt-1 font-semibold">Strengthen your Python projects</p>
                    <p class="text-slate-400">Your impact score is the lowest dimension — quantify outcomes in 2 bullets.</p>
                  </div>
                  <button data-go="resume-analyzer" class="btn-primary w-full rounded-lg py-2.5 font-semibold">Strengthen Python projects →</button>
                </div>
              </div>
            </div>
            <h3 class="mb-4 mt-8 font-display text-lg font-semibold">Jump back into a tool</h3>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
              ${quick.map(([icon, title, sub, slug]) => `
                <button data-go="${slug}" class="glass stat-card group flex items-center gap-4 rounded-2xl p-5 text-left">
                  <span class="grid h-12 w-12 shrink-0 place-items-center rounded-xl bg-gradient-to-br from-primary/20 to-accent/20 text-primary transition group-hover:from-primary group-hover:to-accent group-hover:text-white"><i data-lucide="${icon}" class="h-6 w-6"></i></span>
                  <div><p class="font-semibold text-white">${title}</p><p class="text-sm text-slate-400">${sub}</p></div>
                  <i data-lucide="arrow-up-right" class="ml-auto h-5 w-5 text-slate-500 transition group-hover:text-primary"></i>
                </button>`).join('')}
            </div>`;
        },
        init(root) {
          countUp();
          drawChart();
          const ring = root && root.querySelector('[data-ring]');
          if (ring) {
            const C = 327;
            const ready = +(root.querySelector('[data-count]')?.getAttribute('data-count') || 77);
            const off = C * (1 - ready / 100);
            if (window.gsap && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
              gsap.fromTo(ring, { strokeDashoffset: C }, { strokeDashoffset: off, duration: 1.4, ease: 'power2.out' });
            } else {
              requestAnimationFrame(() => { ring.style.strokeDashoffset = off; });
            }
          }
          const xp = root && root.querySelector('[data-xp]');
          if (xp) requestAnimationFrame(() => { xp.style.width = Math.round((1240 / 1600) * 100) + '%'; });
        },
      };

      /* ---------- Career Intelligence Report ---------- */
      VIEWS['career-report'] = {
        subtitle: 'A 360° AI assessment of your job-readiness.',

      function buildAvatar() {
        const items = [['user', 'Profile', 'settings'], ['settings', 'Settings', 'settings'], ['crown', 'Upgrade to Pro', '__upgrade']];
        $('#avatarPanel').innerHTML = `<div class="border-b border-white/10 p-3"><p class="text-sm font-semibold">${USER.name}</p><p class="text-xs text-slate-500">${USER.email}</p></div><div class="p-1">${items.map(([ic, l, go]) => `<button data-go="${go}" class="flex w-full items-center gap-2.5 rounded-lg px-3 py-2 text-sm text-slate-200 hover:bg-white/10"><i data-lucide="${ic}" class="h-4 w-4"></i>${l}</button>`).join('')}<button data-signout class="flex w-full items-center gap-2.5 rounded-lg px-3 py-2 text-sm text-rose-300 hover:bg-rose-500/10"><i data-lucide="log-out" class="h-4 w-4"></i>Sign out</button></div>`;
        icons();
        $('#avatarPanel [data-signout]').addEventListener('click', () => { try { localStorage.removeItem('acm-auth'); } catch (_) {} window.location.href = 'login.html'; });
      }

      function upgradeModal() {
        closeAllPanels();
        openModal(`
          <div class="text-center"><span class="mx-auto grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white"><i data-lucide="crown" class="h-6 w-6"></i></span><h3 class="mt-4 font-display text-xl font-bold">Upgrade to Pro</h3><p class="mt-1 text-sm text-slate-400">Unlimited everything across all 10 tools.</p></div>
          <ul class="mt-5 space-y-2 text-sm">${['Unlimited resume & ATS scans', 'Unlimited AI mock interviews', 'PDF/DOCX exports', 'Priority AI models'].map((f) => `<li class="flex items-center gap-2"><i data-lucide="check" class="h-4 w-4 text-emerald-400"></i>${f}</li>`).join('')}</ul>
          <div class="mt-6 flex items-baseline justify-center gap-1"><span class="font-display text-4xl font-bold">$19</span><span class="text-slate-400">/mo</span></div>
          <div class="mt-5 flex gap-3"><button data-close class="btn-ghost flex-1 rounded-lg py-2.5 text-sm font-semibold">Maybe later</button><button data-choose class="btn-primary flex-1 rounded-lg py-2.5 text-sm font-semibold">Choose Pro</button></div>`);
        $('#modalRoot [data-close]').addEventListener('click', closeModal);
        $('#modalRoot [data-choose]').addEventListener('click', () => { closeModal(); toast('Welcome to Pro! 🎉 (demo)', 'success'); confetti(); });
      }

      /* ----- ⌘K command palette (search tools + run actions) ----- */
      const COMMANDS = [
        ...NAV.map(([slug, icon, label]) => ({ type: 'tool', icon, label, run: () => { location.hash = slug; } })),
        { type: 'action', icon: 'sun-moon', label: 'Toggle light / dark theme', run: () => window.ACM && window.ACM.toggle() },
        { type: 'action', icon: 'crown', label: 'Upgrade to Pro', run: () => upgradeModal() },
        { type: 'action', icon: 'home', label: 'Go to landing page', run: () => { window.location.href = 'index.html'; } },
        { type: 'action', icon: 'log-out', label: 'Sign out', run: () => { window.location.href = 'index.html'; } },
      ];
      let cmdkMatches = [], cmdkActive = 0;

      function renderCmdk(q) {
        const query = q.trim().toLowerCase();
        cmdkMatches = COMMANDS.filter((c) => c.label.toLowerCase().includes(query));
        cmdkActive = 0;
        const list = $('#cmdkList');
        if (!cmdkMatches.length) { list.innerHTML = `<div class="px-3 py-6 text-center text-sm text-slate-500">No matches for “${esc(q)}”</div>`; return; }
        list.innerHTML = cmdkMatches.map((c, i) => `<div class="cmdk-item ${i === 0 ? 'active' : ''} flex items-center gap-3 rounded-lg px-3 py-2.5" data-i="${i}"><span class="grid h-8 w-8 shrink-0 place-items-center rounded-lg bg-white/5 text-primary"><i data-lucide="${c.icon}" class="h-4 w-4"></i></span><span class="flex-1 text-sm text-slate-200">${c.label}</span><span class="rounded border border-white/10 px-1.5 py-0.5 text-[10px] uppercase tracking-wide text-slate-500">${c.type}</span></div>`).join('');
        icons();
      }
      function highlightCmdk() {
        $$('#cmdkList .cmdk-item').forEach((el, i) => el.classList.toggle('active', i === cmdkActive));
        $('#cmdkList .cmdk-item.active')?.scrollIntoView({ block: 'nearest' });
      }
      function moveCmdk(d) { if (!cmdkMatches.length) return; cmdkActive = (cmdkActive + d + cmdkMatches.length) % cmdkMatches.length; highlightCmdk(); }
      function runCmdk(i) { const c = cmdkMatches[i]; if (!c) return; closeCmdk(); c.run(); }
      function openCmdk() {
        closeAllPanels();
        const overlay = $('#cmdk'), input = $('#cmdkInput');
        overlay.classList.remove('hidden'); overlay.classList.add('flex');
        input.value = ''; renderCmdk('');
        setTimeout(() => input.focus(), 30);
      }
      function closeCmdk() { const o = $('#cmdk'); o.classList.add('hidden'); o.classList.remove('flex'); }
      function buildCmdk() {
        const input = $('#cmdkInput'), list = $('#cmdkList');
        $('#cmdkOpen').addEventListener('click', openCmdk);
        input.addEventListener('input', () => renderCmdk(input.value));
        input.addEventListener('keydown', (e) => {
          if (e.key === 'ArrowDown') { e.preventDefault(); moveCmdk(1); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); moveCmdk(-1); }
          else if (e.key === 'Enter') { e.preventDefault(); runCmdk(cmdkActive); }
        });
        list.addEventListener('click', (e) => { const item = e.target.closest('[data-i]'); if (item) runCmdk(+item.dataset.i); });
        $('#cmdk').addEventListener('click', (e) => { if (e.target.id === 'cmdk') closeCmdk(); });
      }

      /* ----- confetti burst (Web Animations API, no library) ----- */
      function confetti() {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        const colors = ['#7c6cff', '#22d3ee', '#34d399', '#fbbf24', '#fb7185'];
        const layer = document.createElement('div');
        layer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:120;overflow:hidden';
        document.body.appendChild(layer);
        for (let i = 0; i < 110; i++) {
          const p = document.createElement('div');
          const size = 6 + Math.random() * 8;
          p.className = 'confetti-piece';
          p.style.left = Math.random() * 100 + 'vw';
          p.style.width = size + 'px';
          p.style.height = size * 0.5 + 'px';
          p.style.background = colors[i % colors.length];
          layer.appendChild(p);
          const driftX = (Math.random() - 0.5) * 260;
          const rot = (Math.random() * 6 - 3) * 360;
          p.animate(
            [{ transform: 'translate(0,-12px) rotate(0deg)', opacity: 1 }, { transform: `translate(${driftX}px, ${window.innerHeight + 60}px) rotate(${rot}deg)`, opacity: 1 }],
            { duration: 1600 + Math.random() * 1400, easing: 'cubic-bezier(.2,.6,.4,1)', delay: Math.random() * 250, fill: 'forwards' }
          );
        }
        setTimeout(() => layer.remove(), 3400);
      }

      /* ============================ DELEGATION ============================ */
      document.addEventListener('click', (e) => {
        const goEl = e.target.closest('[data-go]');
        if (goEl) { const dest = goEl.dataset.go; if (dest === '__upgrade') { upgradeModal(); return; } location.hash = dest; return; }
        const actEl = e.target.closest('[data-action]');
        if (actEl && actEl.dataset.action === 'upgrade') upgradeModal();
      });
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#bellBtn') && !e.target.closest('#notifPanel')) $('#notifPanel')?.classList.add('hidden');
        if (!e.target.closest('#avatarBtn') && !e.target.closest('#avatarPanel')) $('#avatarPanel')?.classList.add('hidden');
      });

      /* ============================ BOOT ============================ */
      function boot() {
        renderNav(); buildNotifs(); buildAvatar(); buildCmdk(); icons();
        $('#avatarBtn').textContent = USER.initial;
        $('#menuBtn').addEventListener('click', openSidebar);
        $('#backdrop').addEventListener('click', closeSidebar);
        $('#bellBtn').addEventListener('click', (e) => { e.stopPropagation(); const p = $('#notifPanel'); const willOpen = p.classList.contains('hidden'); closeAllPanels(); p.classList.toggle('hidden', !willOpen); });
        $('#avatarBtn').addEventListener('click', (e) => { e.stopPropagation(); const p = $('#avatarPanel'); const willOpen = p.classList.contains('hidden'); closeAllPanels(); p.classList.toggle('hidden', !willOpen); });
        document.addEventListener('keydown', (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); openCmdk(); return; }
          if (e.key === '/' && !/INPUT|TEXTAREA/.test(document.activeElement.tagName)) { e.preventDefault(); openCmdk(); }
        });
        // re-render current view on theme change so inline colors + chart adapt, and confirm with a toast
        window.addEventListener('acm:themechange', (e) => { route(); toast(((e.detail && e.detail.theme) === 'light' ? 'Light' : 'Dark') + ' mode on', 'info'); });
        window.addEventListener('hashchange', route);
        route();
      }
      window.addEventListener('load', boot);
    </script>
  </body>
</html>
