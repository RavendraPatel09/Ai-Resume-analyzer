<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%237c6cff'/%3E%3Cstop offset='1' stop-color='%2322d3ee'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Cpath d='M16 7l2.2 5.3L24 14l-5.3 2.2L16 21l-2.2-5.3L8 14z' fill='white'/%3E%3C/svg%3E" />
    <title>Dashboard · AI Career Mentor</title>
    <meta name="description" content="Your AI career command center — 10 tools, one memory." />

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: 'hsl(250 84% 62%)',
              accent: 'hsl(190 95% 55%)',
              ink: 'hsl(240 15% 4%)',
            },
            fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'], display: ['"Sora"', 'Inter', 'sans-serif'] },
          },
        },
      };
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <style>
      :root { --primary: 250 84% 62%; --accent: 190 95% 55%; --bg: 240 17% 4%; }
      * { -webkit-tap-highlight-color: transparent; }
      body { font-family: 'Inter', system-ui, sans-serif; background: hsl(var(--bg)); color: #e7e8ee; }
      .font-display { font-family: 'Sora', Inter, sans-serif; }
      .glass {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.035);
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      }
      .gradient-text {
        background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent)));
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .grid-bg {
        position: fixed; inset: 0; z-index: -2;
        background-image:
          linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
        background-size: 56px 56px;
        mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 40%, transparent 80%);
        -webkit-mask-image: radial-gradient(ellipse 70% 60% at 50% 0%, #000 40%, transparent 80%);
      }
      .orb { position: fixed; z-index: -1; border-radius: 9999px; filter: blur(90px); opacity: .4; pointer-events: none; }
      .orb-1 { width: 460px; height: 460px; top: -140px; left: -100px; background: radial-gradient(circle, hsla(250,84%,62%,.5), transparent 70%); }
      .orb-2 { width: 460px; height: 460px; top: 30%; right: -160px; background: radial-gradient(circle, hsla(190,95%,55%,.4), transparent 70%); }

      .stat-card { transition: transform .25s cubic-bezier(.2,.8,.2,1), border-color .25s, box-shadow .25s; will-change: transform; }
      .stat-card:hover { transform: translateY(-5px); border-color: hsla(250,84%,62%,.45); box-shadow: 0 22px 50px -22px hsla(250,84%,62%,.6); }

      .nav-link { position: relative; transition: color .2s, background .2s; }
      .nav-link::before {
        content: ''; position: absolute; left: 0; top: 50%; height: 0; width: 3px; border-radius: 9999px;
        background: linear-gradient(hsl(var(--primary)), hsl(var(--accent))); transform: translateY(-50%); transition: height .25s ease;
      }
      .nav-link:hover::before, .nav-link.active::before { height: 60%; }

      .btn-primary { position: relative; overflow: hidden; background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent))); box-shadow: 0 12px 40px -12px hsla(250,84%,62%,.7); transition: transform .15s ease; }
      .btn-primary:hover { transform: translateY(-1px); }
      .btn-primary:active { transform: translateY(0); }
      .btn-primary::after { content: ''; position: absolute; inset: 0; background: linear-gradient(100deg, transparent, rgba(255,255,255,.3), transparent); transform: translateX(-120%); transition: transform .6s ease; }
      .btn-primary:hover::after { transform: translateX(120%); }
      .btn-ghost { transition: background .2s, color .2s, border-color .2s; }
      .btn-ghost:hover { background: rgba(255,255,255,.08); }

      /* drag/drop zone */
      .dropzone { transition: border-color .2s, background .2s; }
      .dropzone.is-drag { border-color: hsl(var(--primary)); background: hsla(250,84%,62%,.08); }

      /* toggle switch */
      .switch { width: 44px; height: 24px; border-radius: 9999px; background: rgba(255,255,255,.12); position: relative; transition: background .2s; cursor: pointer; flex: none; }
      .switch::after { content: ''; position: absolute; top: 3px; left: 3px; height: 18px; width: 18px; border-radius: 9999px; background: #fff; transition: transform .2s; }
      .switch.on { background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent))); }
      .switch.on::after { transform: translateX(20px); }

      /* chat bubbles */
      .bubble-user { background: linear-gradient(100deg, hsl(var(--primary)), hsl(var(--accent))); color: #fff; }
      .typing span { display: inline-block; width: 6px; height: 6px; border-radius: 9999px; background: currentColor; opacity: .5; animation: blink 1.2s infinite; }
      .typing span:nth-child(2) { animation-delay: .2s; } .typing span:nth-child(3) { animation-delay: .4s; }
      @keyframes blink { 0%,100% { opacity: .25; transform: translateY(0); } 50% { opacity: 1; transform: translateY(-2px); } }

      /* toast + modal */
      #toasts { position: fixed; bottom: 1.25rem; right: 1.25rem; z-index: 100; display: flex; flex-direction: column; gap: .6rem; }
      .toast { animation: toastIn .3s cubic-bezier(.2,.8,.2,1) both; }
      .toast.out { animation: toastOut .3s ease forwards; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: none; } }
      @keyframes toastOut { to { opacity: 0; transform: translateX(40px); } }
      #modalRoot:not(.hidden) { animation: fadeIn .2s ease; }
      .modal-card { animation: modalIn .25s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes fadeIn { from { opacity: 0; } } @keyframes modalIn { from { opacity: 0; transform: translateY(20px) scale(.98); } }

      .view-enter { animation: viewIn .4s cubic-bezier(.2,.8,.2,1) both; }
      @keyframes viewIn { from { opacity: 0; transform: translateY(12px); } }

      ::selection { background: hsla(250,84%,62%,.4); color: #fff; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 9999px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,.18); }
      @media (prefers-reduced-motion: reduce) { .view-enter, .toast, .modal-card { animation: none !important; } }
    </style>
  </head>

  <body class="min-h-screen antialiased">
    <div class="grid-bg"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="flex min-h-screen">
      <!-- ===================== Sidebar ===================== -->
      <aside id="sidebar" class="glass fixed inset-y-0 left-0 z-40 w-64 shrink-0 -translate-x-full overflow-y-auto p-4 transition-transform duration-300 lg:sticky lg:top-0 lg:h-screen lg:translate-x-0">
        <a href="index.html" class="mb-7 flex items-center gap-2.5 px-2 font-bold">
          <span class="grid h-9 w-9 place-items-center rounded-xl bg-gradient-to-br from-primary to-accent text-white"><i data-lucide="sparkles" class="h-5 w-5"></i></span>
          <span class="font-display text-base">Career Mentor</span>
        </a>
        <nav id="nav" class="flex flex-col gap-0.5"></nav>

        <div class="glass mt-6 rounded-2xl bg-gradient-to-br from-primary/15 to-accent/10 p-4">
          <p class="inline-flex items-center gap-1.5 text-xs font-semibold text-primary"><i data-lucide="zap" class="h-3.5 w-3.5"></i> Free plan</p>
          <p class="mt-1 text-sm text-slate-300">Unlock unlimited scans, interviews &amp; exports.</p>
          <button data-action="upgrade" class="btn-primary mt-3 w-full rounded-lg py-2 text-sm font-semibold text-white">Upgrade to Pro</button>
        </div>
      </aside>

      <!-- mobile backdrop -->
      <div id="backdrop" class="fixed inset-0 z-30 hidden bg-black/60 backdrop-blur-sm lg:hidden"></div>

      <!-- ===================== Main ===================== -->
      <div class="flex min-h-screen flex-1 flex-col px-4 pb-12 pt-4 sm:px-6">
        <!-- Topbar -->
        <header class="glass relative mb-6 flex h-14 items-center justify-between gap-3 rounded-2xl px-3 sm:px-4">
          <div class="flex flex-1 items-center gap-2">
            <button id="menuBtn" class="btn-ghost grid h-9 w-9 place-items-center rounded-lg text-slate-300 lg:hidden" aria-label="Open menu">
              <i data-lucide="menu" class="h-5 w-5"></i>
            </button>
            <!-- search -->
            <div class="relative max-w-md flex-1">
              <i data-lucide="search" class="pointer-events-none absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-slate-500"></i>
              <input id="search" type="text" autocomplete="off" placeholder="Search tools…  (press /)"
                class="w-full rounded-lg border border-white/10 bg-white/5 py-2 pl-9 pr-3 text-sm text-slate-200 outline-none transition placeholder:text-slate-500 focus:border-primary/60 focus:bg-white/10" />
              <div id="searchResults" class="absolute left-0 right-0 top-12 z-30 hidden overflow-hidden rounded-xl border border-white/10 bg-ink/95 p-1.5 shadow-2xl backdrop-blur"></div>
            </div>
          </div>
          <div class="flex items-center gap-2">
            <!-- notifications -->
            <div class="relative">
              <button id="bellBtn" class="btn-ghost relative grid h-9 w-9 place-items-center rounded-lg text-slate-300" aria-label="Notifications">
                <i data-lucide="bell" class="h-5 w-5"></i>
                <span class="absolute right-1.5 top-1.5 h-2 w-2 rounded-full bg-accent ring-2 ring-ink"></span>
              </button>
              <div id="notifPanel" class="absolute right-0 top-12 z-30 hidden w-80 overflow-hidden rounded-xl border border-white/10 bg-ink/95 shadow-2xl backdrop-blur"></div>
            </div>
            <!-- avatar -->
            <div class="relative">
              <button id="avatarBtn" class="grid h-9 w-9 place-items-center rounded-full bg-gradient-to-br from-primary to-accent text-sm font-semibold text-white" aria-label="Account">R</button>
              <div id="avatarPanel" class="absolute right-0 top-12 z-30 hidden w-52 overflow-hidden rounded-xl border border-white/10 bg-ink/95 p-1.5 shadow-2xl backdrop-blur"></div>
            </div>
          </div>
        </header>

        <!-- Page header -->
        <div id="pageHeader" class="mx-auto mb-6 w-full max-w-6xl"></div>

        <!-- Routed content -->
        <main id="content" class="mx-auto w-full max-w-6xl flex-1"></main>

        <p class="mx-auto mt-8 w-full max-w-6xl text-center text-xs text-slate-500">Static preview · the real dashboard fetches live data from the NestJS API</p>
      </div>
    </div>

    <!-- toast + modal roots -->
    <div id="toasts"></div>
    <div id="modalRoot" class="fixed inset-0 z-[90] hidden items-center justify-center bg-black/70 p-4 backdrop-blur-sm"></div>

    <script>
      /* ============================================================
         DATA
      ============================================================ */
      const NAV = [
        ['dashboard',          'layout-dashboard', 'Dashboard'],
        ['resume-analyzer',    'file-search',      'Resume Analyzer'],
        ['ats-scanner',        'shield-check',     'ATS Scanner'],
        ['skill-gap',          'target',           'Skill Gap'],
        ['job-match',          'briefcase',        'Job Match'],
        ['mock-interview',     'mic',              'Mock Interview'],
        ['chatbot',            'bot',              'Career Chatbot'],
        ['recruiter-insights', 'eye',              'Recruiter Insights'],
        ['roadmap',            'map',              'Career Roadmap'],
        ['resume-builder',     'file-pen',         'Resume Builder'],
        ['cover-letter',       'mail',             'Cover Letters'],
        ['memory',             'brain-circuit',    'AI Memory'],
        ['progress',           'trending-up',      'Progress'],
        ['settings',           'settings',         'Settings'],
        ['admin',              'shield',           'Admin'],
      ];
      const META = Object.fromEntries(NAV.map(([slug, icon, label]) => [slug, { icon, label }]));

      /* ============================================================
         HELPERS
      ============================================================ */
      const $ = (sel, root = document) => root.querySelector(sel);
      const $$ = (sel, root = document) => [...root.querySelectorAll(sel)];
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
      const icons = () => { if (window.lucide) lucide.createIcons(); };
      const scoreColor = (v) => (v >= 80 ? '#34d399' : v >= 60 ? '#fbbf24' : '#fb7185');

      let chart = null; // single Chart.js instance, destroyed between views

      function toast(msg, type = 'info') {
        const map = {
          info:    ['info', 'text-sky-400'],
          success: ['check-circle-2', 'text-emerald-400'],
          warn:    ['alert-triangle', 'text-amber-400'],
          error:   ['x-circle', 'text-rose-400'],
        };
        const [icon, color] = map[type] || map.info;
        const el = document.createElement('div');
        el.className = 'toast glass flex items-center gap-3 rounded-xl px-4 py-3 text-sm shadow-2xl';
        el.innerHTML = `<i data-lucide="${icon}" class="h-5 w-5 ${color}"></i><span>${esc(msg)}</span>`;
        $('#toasts').appendChild(el);
        icons();
        setTimeout(() => {
          el.classList.add('out');
          el.addEventListener('animationend', () => el.remove(), { once: true });
        }, 3200);
      }

      function openModal(html) {
        const root = $('#modalRoot');
        root.innerHTML = `<div class="modal-card glass w-full max-w-md rounded-2xl p-6 shadow-2xl">${html}</div>`;
        root.classList.remove('hidden');
        root.classList.add('flex');
        icons();
      }
      function closeModal() {
        const root = $('#modalRoot');
        root.classList.add('hidden');
        root.classList.remove('flex');
        root.innerHTML = '';
      }
      $('#modalRoot').addEventListener('click', (e) => { if (e.target.id === 'modalRoot') closeModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeModal(); closeAllPanels(); } });

      /* animate a progress bar then resolve */
      function runProgress(barEl, labelEl, steps, done) {
        let i = 0;
        const tick = () => {
          if (i >= steps.length) { done && done(); return; }
          const [pct, label] = steps[i++];
          if (barEl) barEl.style.width = pct + '%';
          if (labelEl) labelEl.textContent = label;
          setTimeout(tick, 450);
        };
        tick();
      }

      /* ============================================================
         VIEWS  — each: { render() -> html, init?(root) }
      ============================================================ */
      const VIEWS = {};

      /* ---------- Dashboard ---------- */
      VIEWS['dashboard'] = {
        subtitle: "Here's your career momentum this week.",
        render() {
          const stats = [
            ['file-search', 'Resume Score', 84, '+6'], ['shield-check', 'ATS Score', 81, '+4'],
            ['mic', 'Interview Score', 76, '+9'], ['target', 'Job Match Rate', 68, '+3'],
          ];
          const quick = [
            ['mic', 'AI Mock Interview', 'Practice your next round', 'mock-interview'],
            ['mail', 'Cover Letter', 'Generate one in seconds', 'cover-letter'],
            ['map', 'Career Roadmap', 'See your 6-month plan', 'roadmap'],
          ];
          return `
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
              ${stats.map(([icon, label, val, delta]) => `
                <div class="glass stat-card rounded-2xl p-5">
                  <div class="flex items-center justify-between">
                    <span class="grid h-10 w-10 place-items-center rounded-xl bg-white/5 text-primary"><i data-lucide="${icon}" class="h-5 w-5"></i></span>
                    <span class="inline-flex items-center gap-1 rounded-full bg-emerald-400/10 px-2 py-0.5 text-xs font-medium text-emerald-400"><i data-lucide="trending-up" class="h-3 w-3"></i> ${delta}</span>
                  </div>
                  <p class="mt-4 font-display text-3xl font-bold" style="color:${scoreColor(val)}" data-count="${val}">0</p>
                  <p class="text-sm text-slate-400">${label}</p>
                </div>`).join('')}
            </div>

            <div class="mt-6 grid gap-6 lg:grid-cols-3">
              <div class="glass rounded-2xl p-6 lg:col-span-2">
                <h3 class="font-display font-semibold">Score progression</h3>
                <p class="text-sm text-slate-400">Resume vs ATS scores over time</p>
                <div class="mt-4 h-64"><canvas id="chart"></canvas></div>
              </div>
              <div class="glass rounded-2xl bg-gradient-to-br from-primary/15 to-accent/10 p-6">
                <div class="inline-flex items-center gap-1.5 text-sm text-primary"><i data-lucide="sparkles" class="h-4 w-4"></i> AI Next Action</div>
                <h3 class="mt-1 font-display text-xl font-bold">Resume Score: 84%</h3>
                <div class="mt-4 space-y-4 text-sm">
                  <div>
                    <p class="text-xs uppercase tracking-wide text-slate-500">Next recommended step</p>
                    <p class="mt-1 font-semibold">Strengthen your Python projects</p>
                    <p class="text-slate-400">Your impact score is the lowest dimension — quantify outcomes in 2 bullets.</p>
                  </div>
                  <button data-go="resume-analyzer" class="btn-primary w-full rounded-lg py-2.5 font-semibold text-white">Strengthen Python projects →</button>
                </div>
              </div>
            </div>

            <h3 class="mb-4 mt-8 font-display text-lg font-semibold">Jump back into a tool</h3>
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
              ${quick.map(([icon, title, sub, slug]) => `
                <button data-go="${slug}" class="glass stat-card group flex items-center gap-4 rounded-2xl p-5 text-left">
                  <span class="grid h-12 w-12 shrink-0 place-items-center rounded-xl bg-gradient-to-br from-primary/20 to-accent/20 text-primary transition group-hover:from-primary group-hover:to-accent group-hover:text-white"><i data-lucide="${icon}" class="h-6 w-6"></i></span>
                  <div>
                    <p class="font-semibold text-white">${title}</p>
                    <p class="text-sm text-slate-400">${sub}</p>
                  </div>
                  <i data-lucide="arrow-up-right" class="ml-auto h-5 w-5 text-slate-500 transition group-hover:text-primary"></i>
                </button>`).join('')}
            </div>`;
        },
        init() {
          countUp();
          drawChart();
        },
      };

      /* ---------- Reusable analyze flow (resume / ats / skill-gap) ---------- */
      function analyzeView({ slug, inputHTML, steps, resultHTML, cta }) {
        return {
          render() {
            return `
              <div class="grid gap-6 lg:grid-cols-5">
                <div class="glass rounded-2xl p-6 lg:col-span-3">${inputHTML}
                  <button data-run class="btn-primary mt-5 w-full rounded-lg py-3 font-semibold text-white">${cta}</button>
                  <div data-progress class="mt-5 hidden">
                    <p data-plabel class="mb-2 text-sm text-slate-400">Analyzing…</p>
                    <div class="h-2 overflow-hidden rounded-full bg-white/10"><div data-pbar class="h-full w-0 rounded-full bg-gradient-to-r from-primary to-accent transition-all duration-300"></div></div>
                  </div>
                </div>
                <div data-result class="glass hidden rounded-2xl p-6 lg:col-span-2"></div>
                <div data-placeholder class="glass flex flex-col items-center justify-center rounded-2xl p-6 text-center text-slate-500 lg:col-span-2">
                  <i data-lucide="sparkles" class="mb-3 h-8 w-8 text-primary/60"></i>
                  <p class="text-sm">Your AI report will appear here.</p>
                </div>
              </div>`;
          },
          init(root) {
            $('[data-run]', root).addEventListener('click', () => {
              const prog = $('[data-progress]', root);
              const placeholder = $('[data-placeholder]', root);
              const result = $('[data-result]', root);
              prog.classList.remove('hidden');
              $('[data-pbar]', root).style.width = '0%';
              runProgress($('[data-pbar]', root), $('[data-plabel]', root), steps, () => {
                placeholder.classList.add('hidden');
                result.classList.remove('hidden');
                result.classList.add('view-enter');
                result.innerHTML = resultHTML();
                icons();
                toast('Analysis complete — saved to your AI memory', 'success');
              });
            });
          },
        };
      }

      VIEWS['resume-analyzer'] = analyzeView({
        slug: 'resume-analyzer',
        cta: 'Analyze my resume',
        inputHTML: `
          <h3 class="font-display text-lg font-semibold">Upload your resume</h3>
          <p class="mt-1 text-sm text-slate-400">PDF, DOCX or TXT · up to 5 MB</p>
          <label id="dropzone" class="dropzone mt-4 flex cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-white/15 p-10 text-center">
            <i data-lucide="upload-cloud" class="mb-3 h-9 w-9 text-primary"></i>
            <p class="text-sm font-medium text-slate-200"><span data-fname>Drop your file here</span> or <span class="text-primary">browse</span></p>
            <p class="mt-1 text-xs text-slate-500">We never share your data</p>
            <input type="file" class="hidden" accept=".pdf,.docx,.txt" />
          </label>`,
        steps: [[20, 'Extracting text…'], [50, 'Parsing structure…'], [78, 'Scoring with AI…'], [100, 'Building report…']],
        resultHTML: () => {
          const dims = [['Impact', 64], ['Clarity', 88], ['Skills match', 82], ['Formatting', 91], ['Keywords', 79]];
          return `
            <div class="flex items-center justify-between"><h3 class="font-display text-lg font-semibold">Resume score</h3>
              <span class="rounded-full bg-emerald-400/10 px-2.5 py-1 text-xs font-semibold text-emerald-400">Strong</span></div>
            <p class="mt-3 font-display text-5xl font-bold" style="color:${scoreColor(84)}">84<span class="text-2xl text-slate-500">/100</span></p>
            <div class="mt-5 space-y-3">
              ${dims.map(([l, v]) => `
                <div><div class="flex justify-between text-sm"><span class="text-slate-300">${l}</span><span class="text-slate-400">${v}</span></div>
                <div class="mt-1 h-1.5 overflow-hidden rounded-full bg-white/10"><div class="h-full rounded-full" style="width:${v}%;background:${scoreColor(v)}"></div></div></div>`).join('')}
            </div>
            <div class="mt-5 rounded-xl bg-primary/10 p-3 text-sm"><span class="font-semibold text-primary">Top fix:</span> quantify 2 Python project bullets to lift your impact score.</div>
            <button data-go="ats-scanner" class="btn-ghost mt-4 w-full rounded-lg border border-white/10 py-2.5 text-sm font-semibold">Run an ATS scan next →</button>`;
        },

                <div class="flex items-start gap-3 rounded-xl border border-white/10 bg-white/5 p-4">
                  <span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg bg-primary/15 text-primary"><i data-lucide="${icon}" class="h-4 w-4"></i></span>
                  <div><p class="text-xs uppercase tracking-wide text-slate-500">${tag}</p><p class="text-sm text-slate-200">${text}</p></div>
                </div>`).join('')}
            </div>
          </div>`;
        },
        init(root) {
          const list = $('[data-list]', root), inp = $('[data-mem]', root);
          const addMem = () => {
            const v = inp.value.trim(); if (!v) return;
            const el = document.createElement('div');
            el.className = 'view-enter flex items-start gap-3 rounded-xl border border-primary/30 bg-primary/5 p-4';
            el.innerHTML = `<span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg bg-primary/15 text-primary"><i data-lucide="sparkles" class="h-4 w-4"></i></span><div><p class="text-xs uppercase tracking-wide text-slate-500">New</p><p class="text-sm text-slate-200">${esc(v)}</p></div>`;
            list.prepend(el); inp.value = ''; icons();
            toast('Saved to your AI memory', 'success');
          };
          $('[data-add]', root).addEventListener('click', addMem);
          inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') addMem(); });
        },
      };

      /* ---------- Progress ---------- */
      VIEWS['progress'] = {
        render() {
          return `<div class="grid gap-6 lg:grid-cols-3">
            <div class="glass rounded-2xl p-6 lg:col-span-2">
              <h3 class="font-display font-semibold">All scores over time</h3>
              <div class="mt-4 h-72"><canvas id="chart"></canvas></div>
            </div>
            <div class="space-y-4">
              ${[['Applications', 12, 'briefcase'], ['Interviews', 4, 'mic'], ['Day streak', 9, 'flame']].map(([l, v, ic]) => `
                <div class="glass stat-card rounded-2xl p-5"><div class="flex items-center justify-between"><span class="text-sm text-slate-400">${l}</span><i data-lucide="${ic}" class="h-4 w-4 text-primary"></i></div><p class="mt-2 font-display text-3xl font-bold gradient-text" data-count="${v}">0</p></div>`).join('')}
            </div>
          </div>`;
        },
        init() { countUp(); drawChart(true); },
      };

      /* ---------- Settings ---------- */
      VIEWS['settings'] = {
        render() {
          const toggles = [['Email me weekly progress', true], ['AI memory recall', true], ['Share anonymized data', false], ['Beta features', false]];
          return `<div class="mx-auto max-w-2xl space-y-6">
            <div class="glass rounded-2xl p-6">
              <h3 class="font-display text-lg font-semibold">Profile</h3>
              <div class="mt-4 grid gap-3 sm:grid-cols-2">
                <div><label class="text-xs uppercase tracking-wide text-slate-500">Name</label><input value="Ravendra Patel" class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 p-2.5 text-sm outline-none focus:border-primary/60" /></div>
                <div><label class="text-xs uppercase tracking-wide text-slate-500">Target role</label><input value="Senior Backend Engineer" class="mt-1 w-full rounded-lg border border-white/10 bg-white/5 p-2.5 text-sm outline-none focus:border-primary/60" /></div>
              </div>
            </div>
            <div class="glass rounded-2xl p-6">
              <h3 class="font-display text-lg font-semibold">Preferences</h3>
              <div class="mt-4 space-y-1">
                ${toggles.map(([l, on]) => `<div class="flex items-center justify-between py-2.5"><span class="text-sm text-slate-200">${l}</span><div class="switch ${on ? 'on' : ''}" role="switch" aria-checked="${on}"></div></div>`).join('')}
              </div>
            </div>
            <div class="flex justify-end gap-3">
              <button data-action="reset" class="btn-ghost rounded-lg border border-white/10 px-5 py-2.5 text-sm font-semibold">Reset</button>
              <button data-action="save" class="btn-primary rounded-lg px-6 py-2.5 text-sm font-semibold text-white">Save changes</button>
            </div>
          </div>`;
        },
        init(root) {
          $$('.switch', root).forEach((sw) => sw.addEventListener('click', () => {
            const on = sw.classList.toggle('on'); sw.setAttribute('aria-checked', String(on));
          }));
          $('[data-action="save"]', root).addEventListener('click', () => toast('Settings saved', 'success'));
          $('[data-action="reset"]', root).addEventListener('click', () => toast('Settings reset to defaults', 'info'));
        },
      };

      /* ---------- Admin ---------- */
      VIEWS['admin'] = {
        render() {
          const stats = [['Users', '2,481', 'users'], ['MRR', '$8,940', 'dollar-sign'], ['AI cost', '$612', 'cpu'], ['Errors (24h)', '3', 'bug']];
          const rows = [
            ['admin@aicareermentor.dev', 'Admin', 'Pro', 'Active'],
            ['demo@aicareermentor.dev', 'User', 'Free', 'Active'],
            ['jane@acme.io', 'User', 'Pro', 'Active'],
            ['sam@startup.dev', 'User', 'Free', 'Trial'],
          ];
          return `
            <div class="grid gap-4 sm:grid-cols-2 lg:grid-cols-4">
              ${stats.map(([l, v, ic]) => `<div class="glass stat-card rounded-2xl p-5"><div class="flex items-center justify-between"><span class="text-sm text-slate-400">${l}</span><i data-lucide="${ic}" class="h-4 w-4 text-primary"></i></div><p class="mt-2 font-display text-2xl font-bold">${v}</p></div>`).join('')}
            </div>
            <div class="glass mt-6 overflow-hidden rounded-2xl">
              <div class="border-b border-white/10 p-5"><h3 class="font-display font-semibold">Recent users</h3></div>
              <div class="overflow-x-auto"><table class="w-full text-left text-sm">
                <thead class="text-xs uppercase tracking-wide text-slate-500"><tr><th class="p-4">Email</th><th class="p-4">Role</th><th class="p-4">Plan</th><th class="p-4">Status</th></tr></thead>
                <tbody>${rows.map(([e, r, p, s]) => `<tr class="border-t border-white/5 hover:bg-white/5"><td class="p-4 text-slate-200">${e}</td><td class="p-4 text-slate-400">${r}</td><td class="p-4"><span class="rounded-full ${p === 'Pro' ? 'bg-primary/15 text-primary' : 'bg-white/10 text-slate-300'} px-2 py-0.5 text-xs">${p}</span></td><td class="p-4"><span class="text-emerald-400">● ${s}</span></td></tr>`).join('')}</tbody>
              </table></div>
            </div>`;
        },
      };

      /* ============================================================
         SHARED: chart + counters
      ============================================================ */
      function drawChart(extra = false) {
        const canvas = $('#chart'); if (!canvas || !window.Chart) return;
        if (chart) { chart.destroy(); chart = null; }
        const ds = [
          { label: 'Resume', data: [58, 64, 71, 78, 84], borderColor: 'hsl(250 84% 62%)', backgroundColor: 'hsla(250,84%,62%,0.15)', fill: true, tension: 0.4, pointBackgroundColor: 'hsl(250 84% 62%)' },
          { label: 'ATS', data: [49, 57, 66, 74, 81], borderColor: 'hsl(190 95% 55%)', backgroundColor: 'hsla(190,95%,55%,0.15)', fill: true, tension: 0.4, pointBackgroundColor: 'hsl(190 95% 55%)' },
        ];
        if (extra) ds.push({ label: 'Interview', data: [40, 52, 61, 70, 78], borderColor: '#34d399', backgroundColor: 'rgba(52,211,153,0.12)', fill: true, tension: 0.4, pointBackgroundColor: '#34d399' });
        chart = new Chart(canvas, {
          type: 'line',
          data: { labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'], datasets: ds },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { labels: { color: '#94a3b8', usePointStyle: true, boxWidth: 8 } } },
            scales: {
              y: { min: 0, max: 100, ticks: { color: '#64748b' }, grid: { color: 'rgba(148,163,184,0.08)' } },
              x: { ticks: { color: '#64748b' }, grid: { display: false } },
            },
          },
        });
      }

      function countUp() {
        const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        $$('[data-count]').forEach((el) => {
          const end = +el.getAttribute('data-count');
          if (!window.gsap || reduced) { el.textContent = end; return; }
          const obj = { v: 0 };
          gsap.to(obj, { v: end, duration: 1.3, ease: 'power2.out', onUpdate: () => { el.textContent = Math.round(obj.v); } });
        });
      }

      /* ============================================================
         ROUTER
      ============================================================ */
      function renderNav() {
        $('#nav').innerHTML = NAV.map(([slug, icon, label]) => `
          <a href="#${slug}" data-slug="${slug}" class="nav-link flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-slate-400 hover:bg-white/5 hover:text-white">
            <i data-lucide="${icon}" class="h-[18px] w-[18px]"></i><span>${label}</span>
          </a>`).join('');
      }

      function setActiveNav(slug) {
        $$('#nav .nav-link').forEach((a) => {
          const on = a.dataset.slug === slug;
          a.classList.toggle('active', on);
          a.classList.toggle('bg-white/5', on);
          a.classList.toggle('font-semibold', on);
          a.classList.toggle('text-white', on);
          a.classList.toggle('text-slate-400', !on);
        });
      }

      function route() {
        const slug = (location.hash.replace('#', '') || 'dashboard');
        const view = VIEWS[slug] || VIEWS['dashboard'];
        const meta = META[slug] || META['dashboard'];
        const realSlug = VIEWS[slug] ? slug : 'dashboard';

        // page header
        $('#pageHeader').innerHTML = `
          <div class="flex items-center gap-3">
            <span class="grid h-11 w-11 place-items-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white shadow-lg shadow-primary/30"><i data-lucide="${meta.icon}" class="h-5 w-5"></i></span>
            <div>
              <h1 class="font-display text-2xl font-bold">${realSlug === 'dashboard' ? 'Welcome back, Ravendra 👋' : meta.label}</h1>
              <p class="text-sm text-slate-400">${view.subtitle || 'AI Career Mentor'}</p>
            </div>
          </div>`;

        // content
        const content = $('#content');
        content.innerHTML = `<div class="view-enter">${view.render()}</div>`;
        const root = content.firstElementChild;
        icons();
        if (view.init) view.init(root);

        setActiveNav(realSlug);
        closeSidebar();
        closeAllPanels();
        window.scrollTo({ top: 0, behavior: 'auto' });
      }

      /* ============================================================
         TOPBAR: search, notifications, avatar, mobile sidebar, upgrade
      ============================================================ */
      function closeAllPanels() {
        ['#searchResults', '#notifPanel', '#avatarPanel'].forEach((s) => $(s)?.classList.add('hidden'));
      }
      function openSidebar() { $('#sidebar').classList.remove('-translate-x-full'); $('#backdrop').classList.remove('hidden'); }
      function closeSidebar() { if (window.innerWidth < 1024) { $('#sidebar').classList.add('-translate-x-full'); $('#backdrop').classList.add('hidden'); } }

      function buildNotifs() {
        const items = [
          ['check-circle-2', 'Resume re-scored: 84 (+6)', '2h ago'],
          ['mic', 'Interview report ready', 'Yesterday'],
          ['briefcase', '3 new job matches above 85%', '2d ago'],
        ];
        $('#notifPanel').innerHTML = `
          <div class="flex items-center justify-between border-b border-white/10 p-3"><p class="text-sm font-semibold">Notifications</p><button data-mark class="text-xs text-primary hover:underline">Mark all read</button></div>
          <div class="max-h-80 overflow-y-auto">
            ${items.map(([ic, t, time]) => `<div class="flex items-start gap-3 border-b border-white/5 p-3 hover:bg-white/5"><span class="grid h-8 w-8 shrink-0 place-items-center rounded-lg bg-primary/15 text-primary"><i data-lucide="${ic}" class="h-4 w-4"></i></span><div><p class="text-sm text-slate-200">${t}</p><p class="text-xs text-slate-500">${time}</p></div></div>`).join('')}
          </div>`;
        icons();
        $('#notifPanel [data-mark]').addEventListener('click', () => { closeAllPanels(); toast('All notifications marked read', 'info'); });
      }

      function buildAvatar() {
        const items = [['user', 'Profile', 'settings'], ['settings', 'Settings', 'settings'], ['crown', 'Upgrade to Pro', '__upgrade']];
        $('#avatarPanel').innerHTML = `
          <div class="border-b border-white/10 p-3"><p class="text-sm font-semibold">Ravendra Patel</p><p class="text-xs text-slate-500">kurmivivek295@gmail.com</p></div>
          <div class="p-1">
            ${items.map(([ic, l, go]) => `<button data-go="${go}" class="flex w-full items-center gap-2.5 rounded-lg px-3 py-2 text-sm text-slate-200 hover:bg-white/10"><i data-lucide="${ic}" class="h-4 w-4"></i>${l}</button>`).join('')}
            <button data-signout class="flex w-full items-center gap-2.5 rounded-lg px-3 py-2 text-sm text-rose-300 hover:bg-rose-500/10"><i data-lucide="log-out" class="h-4 w-4"></i>Sign out</button>
          </div>`;
        icons();
        $('#avatarPanel [data-signout]').addEventListener('click', () => { window.location.href = 'index.html'; });
      }

      function upgradeModal() {
        closeAllPanels();
        openModal(`
          <div class="text-center">
            <span class="mx-auto grid h-12 w-12 place-items-center rounded-2xl bg-gradient-to-br from-primary to-accent text-white"><i data-lucide="crown" class="h-6 w-6"></i></span>
            <h3 class="mt-4 font-display text-xl font-bold">Upgrade to Pro</h3>
            <p class="mt-1 text-sm text-slate-400">Unlimited everything across all 10 tools.</p>
          </div>
          <ul class="mt-5 space-y-2 text-sm">
            ${['Unlimited resume & ATS scans', 'Unlimited AI mock interviews', 'PDF/DOCX exports', 'Priority AI models'].map((f) => `<li class="flex items-center gap-2"><i data-lucide="check" class="h-4 w-4 text-emerald-400"></i>${f}</li>`).join('')}
          </ul>
          <div class="mt-6 flex items-baseline justify-center gap-1"><span class="font-display text-4xl font-bold">$19</span><span class="text-slate-400">/mo</span></div>
          <div class="mt-5 flex gap-3">
            <button data-close class="btn-ghost flex-1 rounded-lg border border-white/10 py-2.5 text-sm font-semibold">Maybe later</button>
            <button data-choose class="btn-primary flex-1 rounded-lg py-2.5 text-sm font-semibold text-white">Choose Pro</button>
          </div>`);
        $('#modalRoot [data-close]').addEventListener('click', closeModal);
        $('#modalRoot [data-choose]').addEventListener('click', () => { closeModal(); toast('Welcome to Pro! 🎉 (demo)', 'success'); });
      }

      function buildSearch() {
        const input = $('#search'), panel = $('#searchResults');
        const render = (q) => {
          const matches = NAV.filter(([slug, icon, label]) => label.toLowerCase().includes(q.toLowerCase()));
          panel.innerHTML = (matches.length ? matches : [['', 'search-x', 'No tools found']])
            .map(([slug, icon, label]) => slug
              ? `<a href="#${slug}" class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-slate-200 hover:bg-white/10"><i data-lucide="${icon}" class="h-4 w-4 text-primary"></i>${label}</a>`
              : `<div class="flex items-center gap-3 px-3 py-2 text-sm text-slate-500"><i data-lucide="search-x" class="h-4 w-4"></i>No tools found</div>`).join('');
          icons();
        };
        input.addEventListener('focus', () => { render(input.value); panel.classList.remove('hidden'); });
        input.addEventListener('input', () => { render(input.value); panel.classList.remove('hidden'); });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const first = panel.querySelector('a');
            if (first) { location.hash = first.getAttribute('href'); input.blur(); }
          }
        });
        // click a result navigates then closes (handled by global delegation + hashchange)
        panel.addEventListener('click', () => setTimeout(closeAllPanels, 0));
      }

      /* ============================================================
         GLOBAL EVENT DELEGATION  (data-go / data-action)
      ============================================================ */
      document.addEventListener('click', (e) => {
        const goEl = e.target.closest('[data-go]');
        if (goEl) {
          const dest = goEl.dataset.go;
          if (dest === '__upgrade') { upgradeModal(); return; }
          location.hash = dest;
          return;
        }
        const actEl = e.target.closest('[data-action]');
        if (actEl) {
          const a = actEl.dataset.action;
          if (a === 'upgrade') upgradeModal();
        }
      });

      /* close panels when clicking outside */
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#search') && !e.target.closest('#searchResults')) $('#searchResults')?.classList.add('hidden');
        if (!e.target.closest('#bellBtn') && !e.target.closest('#notifPanel')) $('#notifPanel')?.classList.add('hidden');
        if (!e.target.closest('#avatarBtn') && !e.target.closest('#avatarPanel')) $('#avatarPanel')?.classList.add('hidden');
      });

      /* ============================================================
         BOOT
      ============================================================ */
      function boot() {
        renderNav();
        buildNotifs();
        buildAvatar();
        buildSearch();
        icons();

        // topbar buttons
        $('#menuBtn').addEventListener('click', openSidebar);
        $('#backdrop').addEventListener('click', closeSidebar);
        $('#bellBtn').addEventListener('click', (e) => { e.stopPropagation(); const p = $('#notifPanel'); const willOpen = p.classList.contains('hidden'); closeAllPanels(); p.classList.toggle('hidden', !willOpen); });
        $('#avatarBtn').addEventListener('click', (e) => { e.stopPropagation(); const p = $('#avatarPanel'); const willOpen = p.classList.contains('hidden'); closeAllPanels(); p.classList.toggle('hidden', !willOpen); });

        // "/" focuses search
        document.addEventListener('keydown', (e) => {
          if (e.key === '/' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
            e.preventDefault(); $('#search').focus();
          }
        });

        window.addEventListener('hashchange', route);
        route();
      }

      window.addEventListener('load', boot);
    </script>
  </body>
</html>
